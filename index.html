<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Boss Alex — Content Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #faf7f2;
      color: #2c2a26;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border: 1px solid #e2ddd6;
      border-radius: 18px;
      padding: 32px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    h1 {
      margin-top: 0;
      font-size: 36px;
    }
    p {
      line-height: 1.7;
      font-size: 16px;
    }
    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a8885a;
      margin-bottom: 12px;
    }
    .endpoint {
      margin-top: 20px;
      padding: 14px;
      background: #f2ede4;
      border-radius: 12px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Digital Boss Alex</div>
    <h1>Content Hub is live</h1>
    <p>Your Vercel project is connected correctly.</p>
    <p>The backend file is in place, and the next step is replacing this starter page with your full Content Hub interface.</p>
    <div class="endpoint">API endpoint ready at: /api/generate</div>
  </div>
</body>
</html>
